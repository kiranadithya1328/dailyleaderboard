<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Admin Login | DK's Badminton</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow-x: hidden;
}

/* animated gradient background */
body::before {
  content: '';
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 80% 20%, rgba(0, 255, 170, 0.12), transparent 60%),
              radial-gradient(circle at 10% 80%, rgba(0, 183, 255, 0.1), transparent 55%);
  animation: slowMove 12s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes slowMove {
  0% { opacity: 0.4; transform: scale(1);}
  100% { opacity: 0.8; transform: scale(1.08);}
}

/* floating particles */
body::after {
  content: '';
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(circle at 15% 40%, rgba(0,255,170,0.06) 2px, transparent 2px),
                    radial-gradient(circle at 85% 70%, rgba(0,183,255,0.06) 1px, transparent 2px);
  background-size: 45px 45px, 70px 70px;
  pointer-events: none;
  animation: floatParticles 18s linear infinite;
}

@keyframes floatParticles {
  0% { transform: translateY(0px);}
  100% { transform: translateY(-35px);}
}

/* glassmorphism card */
.glass-card {
  background: rgba(15, 30, 50, 0.65);
  backdrop-filter: blur(18px);
  border-radius: 48px;
  padding: 42px 38px;
  width: 90%;
  max-width: 420px;
  border: 1px solid rgba(0, 255, 200, 0.3);
  box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 170, 0.15);
  transition: all 0.3s ease;
  animation: slideUpFade 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

@keyframes slideUpFade {
  0% { opacity: 0; transform: translateY(35px) scale(0.96);}
  100% { opacity: 1; transform: translateY(0) scale(1);}
}

.glass-card:hover {
  border-color: rgba(0, 255, 200, 0.6);
  box-shadow: 0 35px 55px rgba(0, 255, 170, 0.2);
}

/* logo + header */
.logo-area {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.logo-img {
  width: 52px;
  height: 52px;
  object-fit: contain;
  filter: drop-shadow(0 0 12px #6bffb3);
  transition: transform 0.2s;
}

.logo-img:hover {
  transform: scale(1.05);
}

.glass-card h2 {
  font-size: 32px;
  background: linear-gradient(135deg, #FFFFFF, #6bffb3);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 28px;
  text-align: center;
  letter-spacing: -0.3px;
}

.input-group {
  margin-bottom: 20px;
}

.input-group input {
  width: 100%;
  padding: 16px 18px;
  font-size: 16px;
  background: rgba(255, 255, 255, 0.07);
  border: 1.5px solid rgba(0, 255, 200, 0.3);
  border-radius: 28px;
  color: white;
  font-family: inherit;
  transition: all 0.25s ease;
  outline: none;
}

.input-group input:focus {
  border-color: #6bffb3;
  box-shadow: 0 0 0 3px rgba(107, 255, 179, 0.2);
  background: rgba(255, 255, 255, 0.12);
}

.input-group input::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

.btn-premium {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(105deg, #00c2ff, #6bffb3);
  border: none;
  border-radius: 40px;
  color: #0a0f1e;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 12px;
  font-family: inherit;
  box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
}

.btn-premium:hover {
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 14px 26px rgba(0, 255, 170, 0.35);
  filter: brightness(1.03);
}

.btn-premium:active {
  transform: translateY(1px);
}

#msg {
  margin-top: 22px;
  text-align: center;
  font-size: 14px;
  color: #ffb86b;
  font-weight: 500;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 24px;
  color: #b0e0ff;
  text-decoration: none;
  font-size: 14px;
  transition: 0.2s;
}

.back-link:hover {
  color: #6bffb3;
  text-decoration: underline;
}

@media (max-width: 520px) {
  .glass-card {
    padding: 32px 22px;
  }
  .glass-card h2 {
    font-size: 26px;
  }
  .logo-img {
    width: 44px;
    height: 44px;
  }
  .btn-premium {
    padding: 14px;
    font-size: 16px;
  }
}
</style>
</head>
<body>

<div class="glass-card">
  <div class="logo-area">
    <img class="logo-img" src="Dklogo.jpeg" alt="DK's Logo" onerror="this.src='https://placehold.co/52x52/1e2a3a/6bffb3?text=🏸'">
  </div>
  <h2>🔐 Admin Portal</h2>

  <div class="input-group">
    <input id="username" placeholder="Username" autocomplete="off">
  </div>
  <div class="input-group">
    <input id="password" type="password" placeholder="Password">
  </div>

  <button id="loginBtn" class="btn-premium">Login →</button>
  <p id="msg"></p>
  <a href="index.html" class="back-link">← Back to Home</a>
</div>

<script type="module">
import { db, collection, query, where, getDocs } from './firebase-init.js';

const btn = document.getElementById("loginBtn");
const msg = document.getElementById("msg");
const username = document.getElementById("username");
const password = document.getElementById("password");

btn.onclick = async () => {

let user = username.value.trim();
let pass = password.value.trim();

if(!user || !pass){
msg.innerText="❌ Please enter username and password";
return;
}

try{

btn.innerText="⏳ Verifying...";
btn.disabled = true;

const q = query(
collection(db,"users"),
where("username","==",user),
where("password","==",pass),
where("role","==","admin")
);

const snap = await getDocs(q);

if(snap.empty){
msg.innerText="❌ Invalid admin credentials";
btn.innerText="Login →";
btn.disabled = false;
return;
}

sessionStorage.setItem("isLoggedIn","true");
sessionStorage.setItem("role","admin");
sessionStorage.setItem("username", user);

window.location="admin.html";

}catch(e){
console.log(e);
msg.innerText="⚠️ Error: "+e.message;
btn.innerText="Login →";
btn.disabled = false;
}

};
</script>

</body>
</html>
