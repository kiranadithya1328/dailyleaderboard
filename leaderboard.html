<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>DK's Badminton | Live Leaderboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      color: #fff;
      background: radial-gradient(circle at 0% 20%, #0a0f1e, #03060c);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    /* animated background glow */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 70% 30%, rgba(0, 255, 170, 0.08), transparent 50%);
      pointer-events: none;
      animation: slowDrift 14s infinite alternate;
    }
    @keyframes slowDrift {
      0% { opacity: 0.3; transform: scale(1);}
      100% { opacity: 0.7; transform: scale(1.1);}
    }
    .glass-nav {
      background: rgba(10, 20, 35, 0.55);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0, 255, 200, 0.2);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo-title {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 0 12px #6bffb3);
      transition: transform 0.2s;
    }
    .logo-img:hover {
      transform: scale(1.03);
    }
    .logo-title h1 {
      font-size: clamp(22px, 5vw, 32px);
      background: linear-gradient(135deg, #fff, #6bffb3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .btn-premium {
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 700;
      text-decoration: none;
      background: linear-gradient(105deg, rgba(0, 180, 220, 0.85), rgba(0, 255, 170, 0.7));
      color: white;
      border: none;
      font-size: 14px;
      transition: all 0.2s ease;
      box-shadow: 0 5px 12px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    .btn-premium:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 22px rgba(0, 255, 170, 0.25);
      filter: brightness(1.05);
    }
    .wrap {
      max-width: 1400px;
      margin: auto;
      padding: 30px 24px 50px;
    }
    /* top3 podium premium */
    .top3-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 42px;
    }
    .podium-card {
      background: rgba(20, 35, 55, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 200, 0.3);
      border-radius: 42px;
      padding: 28px 18px;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.3);
    }
    .podium-card:hover {
      transform: translateY(-8px);
      border-color: #6bffb3;
      box-shadow: 0 30px 40px -12px rgba(0, 255, 170, 0.2);
    }
    .medal-icon {
      font-size: 54px;
      filter: drop-shadow(0 0 6px gold);
    }
    .player-name {
      font-size: 28px;
      font-weight: 800;
      margin: 12px 0 6px;
    }
    .score-big {
      font-size: 32px;
      font-weight: 700;
      color: #d6ffa5;
    }
    .stats-mini {
      margin-top: 12px;
      font-size: 16px;
      color: #b8e2ff;
    }
    /* glass table */
    .table-glass {
      background: rgba(12, 22, 40, 0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 200, 0.2);
      border-radius: 36px;
      padding: 20px 0;
      overflow: hidden;
      transition: all 0.3s;
    }
    .table-wrap {
      overflow-x: auto;
      padding: 0 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 16px;
    }
    th, td {
      padding: 18px 12px;
      text-align: center;
      border-bottom: 1px solid rgba(0, 255, 200, 0.12);
    }
    th {
      color: #bbf0ff;
      font-weight: 600;
      letter-spacing: 0.5px;
      font-size: 15px;
    }
    tr {
      transition: all 0.2s;
    }
    tr:hover {
      background: rgba(0, 255, 170, 0.08);
      transform: scale(1.005);
    }
    .rank-cell {
      font-weight: 800;
      color: #6bffb3;
    }
    @media (max-width: 700px) {
      .glass-nav { flex-direction: column; text-align: center; }
      th, td { padding: 12px 6px; font-size: 13px; }
      .player-name { font-size: 22px; }
    }

    #splash {
  position: fixed;
  inset: 0;
  background: #08121d;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: hideSplash 0.8s ease forwards;
  animation-delay: 2s;
}

.splash-logo {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  animation: logoPop 1s ease infinite alternate;
  box-shadow: 0 0 25px #00ffc8;
}

#splash h1 {
  margin-top: 18px;
  color: #00ffc8;
  font-size: 24px;
}

@keyframes logoPop {
  from {
    transform: scale(1);
  }
  to {
    transform: scale(1.12);
  }
}

@keyframes hideSplash {
  to {
    opacity: 0;
    visibility: hidden;
  }
}
  </style>
</head>
<body>
  <div id="splash">
  <img src="Dklogo.jpeg" class="splash-logo">
  <h1>DK’s Badminton Club</h1>
</div>
  <div class="glass-nav">
    <div class="logo-title">
      <img class="logo-img" src="Dklogo.jpeg" alt="DK's Logo" onerror="this.src='https://placehold.co/48x48/1e2a3a/6bffb3?text=🏸'">
      <h1>DK’s Badminton Club</h1>
    </div>
    <div class="actions">
      <a class="btn-premium" href="index.html">🏠 Home</a>
      <a class="btn-premium" href="admin-login.html">🔐 Admin</a>
      <a class="btn-premium" href="manager-login.html">📋 Manager</a>
    </div>
  </div>

  <div class="wrap">
    <div id="top3Container" class="top3-grid"></div>

    <div class="table-glass">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Player Name</th><th>PL</th><th>W</th><th>L</th><th>Score</th></tr>
          </thead>
          <tbody id="leaderboardTbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { db, collection, query, orderBy, onSnapshot } from './firebase-init.js';

    const top3Div = document.getElementById('top3Container');
    const tbody = document.getElementById('leaderboardTbody');

    onSnapshot(query(collection(db, "players"), orderBy("score", "desc")), (snap) => {
      const players = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

      // render top3 podium
      top3Div.innerHTML = '';
      const medals = ['🥇', '🥈', '🥉'];
      players.slice(0, 3).forEach((p, idx) => {
        top3Div.innerHTML += `
          <div class="podium-card">
            <div class="medal-icon">${medals[idx]}</div>
            <div class="player-name">${p.name || 'Player'}</div>
            <div class="score-big">${p.score ?? 0} pts</div>
            <div class="stats-mini">🏸 ${p.pl ?? 0} PL | ✅ ${p.w ?? 0} W | ❌ ${p.l ?? 0} L</div>
          </div>
        `;
      });

      // full table
      tbody.innerHTML = '';
      players.forEach((player, index) => {
        const rank = index + 1;
        tbody.innerHTML += `
          <tr>
            <td class="rank-cell">${rank}</td>
            <td><strong>${player.name || '—'}</strong></td>
            <td>${player.pl ?? 0}</td>
            <td style="color:#b2ff9e">${player.w ?? 0}</td>
            <td>${player.l ?? 0}</td>
            <td style="font-weight:bold; color:#ffdd88">${player.score ?? 0}</td>
          </tr>
        `;
      });
    });
  </script>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffc8">
</body>
</html>
