<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>DK's Badminton Club | Leaderboard Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      color: #fff;
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #03060c);
      overflow-x: hidden;
      position: relative;
      animation: fadeBody 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes fadeBody {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* premium animated particles */
    body::before {
      content: '';
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 25% 40%, rgba(0, 255, 170, 0.08) 2px, transparent 2px),
                        radial-gradient(circle at 75% 85%, rgba(0, 183, 255, 0.08) 1px, transparent 2px);
      background-size: 50px 50px, 80px 80px;
      pointer-events: none;
      z-index: 0;
      animation: floatParticles 20s linear infinite;
    }

    @keyframes floatParticles {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-40px); }
    }

    .bg-ball, .bg-ring {
      position: fixed;
      border-radius: 50%;
      filter: blur(55px);
      opacity: 0.3;
      z-index: 0;
      animation: float 12s ease-in-out infinite;
    }
    .bg-ball {
      width: 320px;
      height: 320px;
      background: #17d6ff;
      top: -10%;
      left: -5%;
    }
    .bg-ring {
      width: 380px;
      height: 380px;
      background: #6bffb3;
      right: -8%;
      bottom: -5%;
      opacity: 0.2;
      filter: blur(70px);
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -25px) scale(1.05); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 2;
    }

    .hero {
      width: 100%;
      max-width: 1100px;
      padding: 48px 42px;
      background: rgba(15, 25, 45, 0.55);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(0, 255, 200, 0.2);
      border-radius: 48px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 170, 0.1);
      transition: all 0.3s ease;
      animation: slideUpCard 0.7s ease-out;
    }

    @keyframes slideUpCard {
      0% { opacity: 0; transform: translateY(35px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* header with logo */
    .club-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }
    .logo-area:hover {
      transform: scale(1.02);
    }
    .logo-img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(0, 255, 200, 0.7));
      transition: all 0.3s;
    }
    .logo-img:hover {
      filter: drop-shadow(0 0 20px #6bffb3);
    }
    .title-group h1 {
      font-size: clamp(34px, 7vw, 68px);
      background: linear-gradient(135deg, #FFFFFF, #6bffb3, #17d6ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0;
      letter-spacing: -0.5px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 60px;
      background: rgba(0, 255, 170, 0.12);
      border: 1px solid rgba(0, 255, 200, 0.35);
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(4px);
      margin-bottom: 18px;
    }
    p {
      color: #c4e2ff;
      max-width: 760px;
      font-size: 18px;
      line-height: 1.55;
      margin-top: 18px;
    }
    .grid {
      margin-top: 42px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 78px;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      border-radius: 28px;
      background: linear-gradient(125deg, rgba(30, 50, 80, 0.7), rgba(15, 30, 55, 0.9));
      border: 1px solid rgba(0, 255, 200, 0.3);
      box-shadow: 0 12px 22px -8px rgba(0, 0, 0, 0.4);
      transition: all 0.25s ease;
      color: white;
      letter-spacing: 0.3px;
      backdrop-filter: blur(4px);
    }
    .btn:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: #6bffb3;
      box-shadow: 0 20px 32px -10px rgba(0, 255, 170, 0.3);
      background: linear-gradient(125deg, rgba(40, 70, 110, 0.85), rgba(20, 45, 75, 0.95));
    }
    .small {
      margin-top: 32px;
      color: #9bb6da;
      font-size: 14px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 22px;
    }
    @media (max-width: 640px) {
      .hero { padding: 32px 20px; }
      .club-header { flex-direction: column; text-align: center; }
      .btn { min-height: 68px; font-size: 16px; }
    }

    #splash {
  position: fixed;
  inset: 0;
  background: #08121d;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: hideSplash 0.8s ease forwards;
  animation-delay: 2s;
}

.splash-logo {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  animation: logoPop 1s ease infinite alternate;
  box-shadow: 0 0 25px #00ffc8;
}

#splash h1 {
  margin-top: 18px;
  color: #00ffc8;
  font-size: 24px;
}

@keyframes logoPop {
  from {
    transform: scale(1);
  }
  to {
    transform: scale(1.12);
  }
}

@keyframes hideSplash {
  to {
    opacity: 0;
    visibility: hidden;
  }
}
  </style>
</head>
<body>
  <div id="splash">
  <img src="Dklogo.jpeg" class="splash-logo">
  <h1>DK’s Badminton Club</h1>
</div>
  <div class="bg-ball"></div>
  <div class="bg-ring"></div>

  <div class="wrap">
    <div class="hero">
      <div class="club-header">
        <div class="logo-area">
          <img class="logo-img" src="Dklogo.jpeg" alt="DK's Club Logo" onerror="this.src='https://placehold.co/60x60/1e2a3a/6bffb3?text=🏸'">
        </div>
        <div class="title-group">
          <h1>DK’S BADMINTON CLUB</h1>
        </div>
      </div>
      <div class="badge">
        <span>🏸</span> DK's Badminton Club
      </div>
      <p>
      Who’s ruling the court today? Follow the live rankings and stay in the game.
      </p>

      <div class="grid">
        <a class="btn" href="admin-login.html">🔐 Admin Login</a>
        <a class="btn" href="manager-login.html">🧑‍💼 Manager Login</a>
        <a class="btn" href="leaderboard.html">🏆 View Leaderboard</a>
      </div>

      <div class="small">CHECK YOUR RANKINGS DAILY</div>
    </div>
  </div>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffc8">
</body>
</html>
